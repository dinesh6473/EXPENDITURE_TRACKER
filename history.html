<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <!-- ======= APP NAVIGATION ======= -->

            <!-- Hamburger -->

            <!-- Brand (visible only when expanded) -->

            </a>

            <div class="app-nav-links">

                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">

                            <polyline points="9 22 9 12 15 12 15 22" />

                    <span class="nav-text">Dashboard</span>

                <a href="analytics.html">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

                            <line x1="6" y1="20" x2="6" y2="14" />
                        </svg></span>
                    <span class="nav-text">Analytics</span>
                </a>
                <a href="savings.html">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="5" width="20" height="14" rx="2" />

                        </svg></span>
                    <span class="nav-text">Savings</span>
                </a>
                <a href="auto-pay.html">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 2l4 4-4 4" />
                            <path d="M3 11v-1a4 4 0 0 1 4-4h14" />

                            <path d="M21 13v1a4 4 0 0 1-4 4H3" />
                        </svg></span>
                    <span class="nav-text">Auto Pay</span>
                </a>
                <a href="history.html" class="active">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg></span>
                    <span class="nav-text">History</span>
                </a>
                <a href="profile.html">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg></span>
                    <span class="nav-text">Profile</span>
                </a>
                <div style="flex:1;"></div>
                <a href="#" class="logout-link" id="logoutBtn">
                    <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg></span>
                    <span class="nav-text">Logout</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- ======= TOP USER BAR ======= -->
    <header class="top-user-bar">
        <div class="top-user-info">
            <a href="profile.html" title="Go to Profile">
                <div class="top-user-avatar" id="userAvatar">D</div>
            </a>
            <span class="top-user-name" id="topUserName">Student</span>
        </div>
    </header>

    <!-- ======= PAGE CONTENT ======= -->
    <main class="page-content">
        <div class="container">
            <!-- ======= SIDE DRAWER (ADD EXPENSE) ======= -->
            <div class="side-drawer-overlay" id="drawerOverlay"></div>
            <div class="side-drawer" id="sideDrawer">
                <div class="side-drawer-header">
                    <h3>Add Expense</h3>
                    <button class="side-drawer-close" id="closeDrawerBtn">✕</button>
                </div>
                <div class="side-drawer-body">
                    <div class="alert alert-error" id="drawerError" style="display:none; margin-bottom:20px;">
                        <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="12" />
                                <line x1="12" y1="16" x2="12.01" y2="16" />
                            </svg></span> <span id="drawerErrorText"></span>
                    </div>
                    <div class="alert alert-success" id="drawerSuccess" style="display:none; margin-bottom:20px;">
                        <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                                <polyline points="22 4 12 14.01 9 11.01" />
                            </svg></span> <span id="drawerSuccessText"></span>
                    </div>

                    <form id="drawerExpenseForm">
                        <div class="form-group">
                            <label>Amount (₹)</label>
                            <input type="number" id="drawerAmount" class="form-control" placeholder="0.00" required
                                min="1" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="drawerCategory" class="form-control" required>
                                <option value="">Select a category</option>
                            </select>
                        </div>
                        <div class="form-group" id="customCategoryGroup" style="display:none;">
                            <label>Custom Category Name</label>
                            <input type="text" id="drawerCustomCategory" class="form-control"
                                placeholder="e.g., Gym, Gifts">
                        </div>
                        <div class="form-group">
                            <label>Description (Optional)</label>
                            <input type="text" id="drawerDescription" class="form-control"
                                placeholder="What was this for?">
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="drawerExpenseDate" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                                <select id="drawerExpenseHour" class="form-control" required></select>
                                <select id="drawerExpenseMinute" class="form-control" required></select>
                                <select id="drawerExpenseMeridiem" class="form-control" required>
                                    <option value="AM">AM</option>
                                    <option value="PM">PM</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="side-drawer-footer">
                    <button type="submit" form="drawerExpenseForm" class="btn btn-primary btn-full btn-lg"
                        id="addExpenseBtn">
                        Add Expense
                    </button>
                </div>
            </div>

            <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <h1>History</h1>
                    <p>Your complete expense history.</p>
                </div>
                <button class="btn btn-primary" id="openDrawerBtn"><svg xmlns="http://www.w3.org/2000/svg" width="15"
                        height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;vertical-align:middle;">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg> Add Expense</button>
            </div>

            <!-- Page Loader -->
            <div class="page-loader" id="pageLoader">
                <div class="spinner" style="width:40px;height:40px;border-width:3px;"></div>
            </div>

            <div id="transactionsContent" style="display:none;">
                <div class="table-container">
                    <div class="table-header">
                        <h3 id="transactionCount">0 Transactions</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th style="text-align:right;">Amount</th>
                                <th style="width:50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="transactionList">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script>
        const drawerExpenseHour = document.getElementById('drawerExpenseHour');
        const drawerExpenseMinute = document.getElementById('drawerExpenseMinute');
        const drawerExpenseMeridiem = document.getElementById('drawerExpenseMeridiem');

        function fillDrawerTimeOptions() {
            if (drawerExpenseHour.options.length === 0) {
                for (let hour = 1; hour <= 12; hour++) {
                    const opt = document.createElement('option');
                    opt.value = String(hour);
                    opt.textContent = String(hour);
                    drawerExpenseHour.appendChild(opt);
                }
            }

            if (drawerExpenseMinute.options.length === 0) {
                for (let minute = 0; minute < 60; minute++) {
                    const value = String(minute).padStart(2, '0');
                    const opt = document.createElement('option');
                    opt.value = value;
                    opt.textContent = value;
                    drawerExpenseMinute.appendChild(opt);
                }
            }
        }

        function setDrawerExpenseTime(time24) {
            const parts = to12HourParts(time24);
            drawerExpenseHour.value = parts.hour;
            drawerExpenseMinute.value = parts.minute;
            drawerExpenseMeridiem.value = parts.meridiem;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const authed = await requireAuth();
            if (!authed) return;
            fillDrawerTimeOptions();
            await loadTransactions();
        });

        async function loadTransactions() {
            try {
                // Fetch both expenses and wallet transactions
                const [expenses, walletTxns] = await Promise.all([
                    getExpenses(),
                    getWalletTransactions()
                ]);

                // Normalize expenses
                const normalizedExpenses = expenses.map(exp => ({
                    ...exp,
                    type: 'expense',
                    displayDate: exp.expense_date,
                    sortTime: getExpenseDateTime(exp)?.getTime() || 0
                }));

                // Normalize wallet transactions
                const normalizedWalletTxns = walletTxns.map(txn => ({
                    ...txn,
                    type: 'wallet',
                    // Wallet txns only have created_at
                    displayDate: txn.created_at,
                    sortTime: new Date(txn.created_at).getTime()
                }));

                // Merge and sort explicitly by exact time (latest first)
                const allTransactions = [...normalizedExpenses, ...normalizedWalletTxns].sort((a, b) => b.sortTime - a.sortTime);

                const tbody = document.getElementById('transactionList');
                const count = document.getElementById('transactionCount');

                count.textContent = allTransactions.length + ' Transaction' + (allTransactions.length !== 1 ? 's' : '');

                if (allTransactions.length === 0) {
                    tbody.innerHTML = `
            <tr><td colspan="6">
              <div class="empty-state">
                <div class="empty-icon"><svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><polyline points='14 2 14 8 20 8'/><line x1='16' y1='13' x2='8' y2='13'/><line x1='16' y1='17' x2='8' y2='17'/><polyline points='10 9 9 9 8 9'/></svg></div>
                <p>No transactions yet. <a href="#" onclick="openDrawer(); return false;" style="color:var(--primary);font-weight:600;">Add your first expense →</a></p>
              </div>
            </td></tr>`;
                } else {
                    tbody.innerHTML = allTransactions.map(item => {
                        const displayTime = item.type === 'expense'
                            ? formatExpenseTime(getExpenseDateTime(item))
                            : formatExpenseTime(item.created_at);
                        const timeStr = item.created_at
                            ? new Date(item.created_at).toLocaleTimeString('en-IN', {
                                hour: 'numeric',
                                minute: '2-digit',
                                hour12: true,
                                timeZone: 'Asia/Kolkata'
                            }).toUpperCase()
                            : '—';

                        // Handle formatting based on transaction type
                        if (item.type === 'expense') {
                            return `
            <tr>
              <td>${new Date(item.displayDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
              <td style="color:var(--gray-500);font-size:0.9rem;">${displayTime}</td>
              <td><span class="category-badge">${getCategoryIcon(item.category_name)} ${item.category_name}</span></td>
              <td>${item.description || '—'}</td>
              <td style="text-align:right;" class="amount-negative">-₹${parseFloat(item.amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
              <td>
                <button class="btn-delete" onclick="handleDelete('${item.id}')" title="Delete"><svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='3 6 5 6 21 6'/><path d='M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2'/></svg></button>
              </td>
            </tr>
          `;
                        } else {
                            // Wallet top-up display
                            // Note: we don't allow deleting wallet top-ups from history easily because 
                            // they affect total wallet balance heavily. We'll leave the delete button empty.
                            return `
            <tr style="background-color: var(--primary-lighter); opacity: 0.95;">
              <td>${new Date(item.displayDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
              <td style="color:var(--gray-600);font-size:0.9rem;font-weight:500;">${displayTime}</td>
              <td><span class="category-badge" style="background:var(--primary);color:white;">💳 Wallet Top-up</span></td>
              <td style="font-weight:500;">${item.description || 'Added to Wallet'}</td>
              <td style="text-align:right;color:var(--primary);font-weight:700;">+₹${parseFloat(item.amount).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
              <td></td>
            </tr>
          `;
                        }
                    }).join('');
                }

                document.getElementById('pageLoader').style.display = 'none';
                document.getElementById('transactionsContent').style.display = 'block';
            } catch (err) {
                console.error(err);
                document.getElementById('pageLoader').innerHTML = '<p style="color:var(--danger);">Error loading transactions.</p>';
            }
        }

        async function handleDelete(id) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            try {
                await deleteExpense(id);
                await loadTransactions();
            } catch (err) {
                alert('Failed to delete: ' + err.message);
            }
        }

        function getCategoryIcon(name) {
            const icons = { 'Food': '🍔', 'Travel': '🚌', 'Books': '📚', 'Entertainment': '🎮', 'Hostel / Rent': '🏠', 'Recharge': '📱', 'Stationary': '✏️' };
            return icons[name] || '📦';
        }

        // ── Side Drawer Logic ──────────────────────────────────────
        const sideDrawer = document.getElementById('sideDrawer');
        const drawerOverlay = document.getElementById('drawerOverlay');
        const openDrawerBtn = document.getElementById('openDrawerBtn');
        const closeDrawerBtn = document.getElementById('closeDrawerBtn');
        const expenseForm = document.getElementById('drawerExpenseForm');
        const addExpenseBtn = document.getElementById('addExpenseBtn');
        const drawerCategorySelect = document.getElementById('drawerCategory');
        const customCategoryGroup = document.getElementById('customCategoryGroup');

        function openDrawer() {
            sideDrawer.classList.add('active');
            drawerOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            loadDrawerCategories();
            document.getElementById('drawerExpenseDate').value = getCurrentIstDate();
            setDrawerExpenseTime(getCurrentIstTime());
        }

        function closeDrawer() {
            sideDrawer.classList.remove('active');
            drawerOverlay.classList.remove('active');
            document.body.style.overflow = '';
            expenseForm.reset();
            hideDrawerAlerts();
            customCategoryGroup.style.display = 'none';
        }

        openDrawerBtn.addEventListener('click', openDrawer);
        closeDrawerBtn.addEventListener('click', closeDrawer);
        drawerOverlay.addEventListener('click', closeDrawer);

        async function loadDrawerCategories() {
            if (drawerCategorySelect.options.length > 1) return;
            try {
                const categories = await getCategories();
                categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = `${cat.icon} ${cat.name}`;
                    opt.dataset.name = cat.name;
                    drawerCategorySelect.appendChild(opt);
                });
                const othersOpt = document.createElement('option');
                othersOpt.value = 'others';
                othersOpt.textContent = '📦 Others (Custom)';
                drawerCategorySelect.appendChild(othersOpt);
            } catch (e) { console.error('Error loading categories:', e); }
        }

        drawerCategorySelect.addEventListener('change', (e) => {
            if (e.target.value === 'others') {
                customCategoryGroup.style.display = 'block';
                document.getElementById('drawerCustomCategory').required = true;
            } else {
                customCategoryGroup.style.display = 'none';
                document.getElementById('drawerCustomCategory').required = false;
            }
        });

        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideDrawerAlerts();

            const amount = document.getElementById('drawerAmount').value;
            const categoryValue = drawerCategorySelect.value;
            const description = document.getElementById('drawerDescription').value.trim();
            const expenseDate = document.getElementById('drawerExpenseDate').value;
            let expenseTime = '';

            try {
                expenseTime = to24HourTime(
                    drawerExpenseHour.value,
                    drawerExpenseMinute.value,
                    drawerExpenseMeridiem.value
                );
                validateExpenseDateTime(expenseDate, expenseTime);
            } catch (err) {
                if (isFutureTimeValidationError(err)) {
                    alert(err.message);
                }
                showDrawerError(err.message);
                return;
            }

            if (!amount || !categoryValue || !expenseDate) {
                showDrawerError('Please fill in all required fields.');
                return;
            }

            let categoryId = categoryValue;
            let categoryName = '';

            addExpenseBtn.disabled = true;
            addExpenseBtn.innerHTML = '<div class="spinner"></div> Adding...';

            try {
                if (categoryValue === 'others') {
                    const customName = document.getElementById('drawerCustomCategory').value.trim();
                    const newCat = await addCategory(customName);
                    categoryId = newCat.id;
                    categoryName = customName;
                } else {
                    categoryName = drawerCategorySelect.options[drawerCategorySelect.selectedIndex].dataset.name;
                }

                await addExpense(amount, categoryId, categoryName, description, expenseDate, expenseTime);
                showDrawerSuccess('Expense added successfully!');

                // Refresh transaction list immediately
                loadTransactions();

                // Keep drawer open but reset form for next entry
                setTimeout(() => {
                    expenseForm.reset();
                    customCategoryGroup.style.display = 'none';
                    document.getElementById('drawerExpenseDate').value = getCurrentIstDate();
                    setDrawerExpenseTime(getCurrentIstTime());
                    addExpenseBtn.disabled = false;
                    addExpenseBtn.textContent = 'Add Another Expense';
                    // Keep success message for 3 seconds then hide
                    setTimeout(() => {
                        document.getElementById('drawerSuccess').style.display = 'none';
                    }, 3000);
                }, 800);

            } catch (err) {
                if (isFutureTimeValidationError(err)) {
                    alert(err.message);
                }
                showDrawerError(err.message || 'Failed to add expense.');
                addExpenseBtn.disabled = false;
                addExpenseBtn.textContent = 'Add Expense';
            }
        });

        function showDrawerError(msg) {
            document.getElementById('drawerErrorText').textContent = msg;
            document.getElementById('drawerError').style.display = 'flex';
        }

        function showDrawerSuccess(msg) {
            document.getElementById('drawerSuccessText').textContent = msg;
            document.getElementById('drawerSuccess').style.display = 'flex';
        }

        function hideDrawerAlerts() {
            document.getElementById('drawerError').style.display = 'none';
            document.getElementById('drawerSuccess').style.display = 'none';
        }
    </script>
</body>

</html>
