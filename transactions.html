<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions – ExpenseIQ</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- ======= APP NAVIGATION ======= -->
    <nav class="app-nav">
        <div class="container">
            <a href="dashboard.html" class="navbar-logo">
                <span class="brand-text">ExpenseIQ</span>
            </a>
            <div class="app-nav-links">
                <a href="dashboard.html">📊 <span class="nav-text">Dashboard</span></a>
                <a href="add-expense.html">➕ <span class="nav-text">Add Expense</span></a>
                <a href="transactions.html" class="active">📜 <span class="nav-text">Transactions</span></a>
                <a href="savings.html">💰 <span class="nav-text">Savings</span></a>
                <a href="profile.html">👤 <span class="nav-text">Profile</span></a>
                <a href="#" class="logout-link" id="logoutBtn">🚪 <span class="nav-text">Logout</span></a>
            </div>
        </div>
    </nav>

    <!-- ======= PAGE CONTENT ======= -->
    <main class="page-content">
        <div class="container">
            <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <h1>Transactions</h1>
                    <p>Your complete expense history.</p>
                </div>
                <a href="add-expense.html" class="btn btn-primary">➕ Add Expense</a>
            </div>

            <!-- Page Loader -->
            <div class="page-loader" id="pageLoader">
                <div class="spinner" style="width:40px;height:40px;border-width:3px;"></div>
            </div>

            <div id="transactionsContent" style="display:none;">
                <div class="table-container">
                    <div class="table-header">
                        <h3 id="transactionCount">0 Transactions</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th style="text-align:right;">Amount</th>
                                <th style="width:50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="transactionList">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authed = await requireAuth();
            if (!authed) return;
            await loadTransactions();
        });

        async function loadTransactions() {
            try {
                const expenses = await getExpenses();
                const tbody = document.getElementById('transactionList');
                const count = document.getElementById('transactionCount');

                count.textContent = expenses.length + ' Transaction' + (expenses.length !== 1 ? 's' : '');

                if (expenses.length === 0) {
                    tbody.innerHTML = `
            <tr><td colspan="5">
              <div class="empty-state">
                <div class="empty-icon">📝</div>
                <p>No transactions yet. <a href="add-expense.html" style="color:var(--primary);font-weight:600;">Add your first expense →</a></p>
              </div>
            </td></tr>`;
                } else {
                    tbody.innerHTML = expenses.map(exp => `
            <tr>
              <td>${new Date(exp.expense_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
              <td><span class="category-badge">${getCategoryIcon(exp.category_name)} ${exp.category_name}</span></td>
              <td>${exp.description || '—'}</td>
              <td style="text-align:right;" class="amount-negative">-₹${parseFloat(exp.amount).toLocaleString('en-IN')}</td>
              <td>
                <button class="btn-delete" onclick="handleDelete('${exp.id}')" title="Delete">🗑️</button>
              </td>
            </tr>
          `).join('');
                }

                document.getElementById('pageLoader').style.display = 'none';
                document.getElementById('transactionsContent').style.display = 'block';
            } catch (err) {
                console.error(err);
                document.getElementById('pageLoader').innerHTML = '<p style="color:var(--danger);">Error loading transactions.</p>';
            }
        }

        async function handleDelete(id) {
            if (!confirm('Are you sure you want to delete this expense?')) return;
            try {
                await deleteExpense(id);
                await loadTransactions();
            } catch (err) {
                alert('Failed to delete: ' + err.message);
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        function getCategoryIcon(name) {
            const icons = { 'Food': '🍔', 'Travel': '🚌', 'Books': '📚', 'Entertainment': '🎮', 'Hostel / Rent': '🏠', 'Recharge': '📱', 'Stationary': '✏️' };
            return icons[name] || '📦';
        }
    </script>
</body>

</html>
