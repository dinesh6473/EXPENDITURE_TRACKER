<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- ======= APP NAVIGATION ======= -->

        <div class="container">
            <a href="dashboard.html" class="navbar-logo">
                <span class="brand-text">ExpenseIQ</span>
            </a>
            <div class="app-nav-links">
                <a href="dashboard.html"><span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18"
                            height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">

                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg></span> <span class="nav-text">Dashboard</span></a>
                <a href="history.html"><span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18"
                            height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg></span> <span class="nav-text">History</span></a>
                <a href="savings.html"><span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18"
                            height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="5" width="20" height="14" rx="2" />
                            <line x1="2" y1="10" x2="22" y2="10" />
                        </svg></span> <span class="nav-text">Savings</span></a>
                <a href="profile.html"><span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18"
                            height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg></span> <span class="nav-text">Profile</span></a>
                <a href="#" class="logout-link" id="logoutBtn"><span class="nav-icon"><svg

                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />

                        </svg></span> <span class="nav-text">Logout</span></a>
            </div>
        </div>

    <!-- ======= PAGE CONTENT ======= -->
    <main class="page-content">
        <div class="container" style="max-width:640px;">
            <div class="page-header">
                <h1>Add Expense</h1>
                <p>Log your spending to keep your wallet updated.</p>
            </div>

            <!-- Wallet Balance Card -->
            <div class="stat-card"
                style="margin-bottom:28px;border-color:var(--primary-lighter);background:var(--primary-lighter);">
                <div class="stat-icon blue"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2" />
                        <line x1="2" y1="10" x2="22" y2="10" />
                    </svg></div>
                <div class="stat-info">
                    <h4 style="color:var(--primary);">Available Balance</h4>
                    <div class="stat-value" id="currentBalance" style="color:var(--primary);">₹0</div>
                </div>
            </div>

            <div class="alert alert-error" id="expenseError">
                <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg></span>
                <span id="expenseErrorText"></span>
            </div>

            <div class="alert alert-success" id="expenseSuccess">
                <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg></span>
                <span id="expenseSuccessText"></span>
            </div>

            <!-- Add Expense Form -->
            <div class="card card-elevated">
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" class="form-control" placeholder="Enter amount" required
                            min="1" step="0.01">
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" class="form-control" required>
                            <option value="">Select a category</option>
                        </select>
                    </div>

                    <!-- Custom category input (shown when "Others" is selected) -->
                    <div class="form-group" id="customCategoryGroup" style="display:none;">
                        <label for="customCategory">Custom Category Name</label>
                        <input type="text" id="customCategory" class="form-control"
                            placeholder="e.g., Gym, Gifts, Medicine">
                        <span class="form-hint">This category will be saved for future use.</span>
                    </div>

                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <input type="text" id="description" class="form-control" placeholder="e.g., Lunch at canteen">
                    </div>

                    <div class="form-group">
                        <label for="expenseDate">Date</label>
                        <input type="date" id="expenseDate" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="expenseTime">Time</label>
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                            <select id="expenseHour" class="form-control" required></select>
                            <select id="expenseMinute" class="form-control" required></select>
                            <select id="expenseMeridiem" class="form-control" required>
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="addExpenseBtn">
                        Add Expense
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        let categoriesList = [];
        const expenseHourSelect = document.getElementById('expenseHour');
        const expenseMinuteSelect = document.getElementById('expenseMinute');
        const expenseMeridiemSelect = document.getElementById('expenseMeridiem');

        function fillTimeSelectOptions(hourSelect, minuteSelect) {
            if (hourSelect.options.length === 0) {
                for (let hour = 1; hour <= 12; hour++) {
                    const opt = document.createElement('option');
                    opt.value = String(hour);
                    opt.textContent = String(hour);
                    hourSelect.appendChild(opt);
                }
            }

            if (minuteSelect.options.length === 0) {
                for (let minute = 0; minute < 60; minute++) {
                    const value = String(minute).padStart(2, '0');
                    const opt = document.createElement('option');
                    opt.value = value;
                    opt.textContent = value;
                    minuteSelect.appendChild(opt);
                }
            }
        }

        function setExpenseFormTime(time24) {
            const parts = to12HourParts(time24);
            expenseHourSelect.value = parts.hour;
            expenseMinuteSelect.value = parts.minute;
            expenseMeridiemSelect.value = parts.meridiem;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const authed = await requireAuth();
            if (!authed) return;

            fillTimeSelectOptions(expenseHourSelect, expenseMinuteSelect);

            // Set default date to today
            document.getElementById('expenseDate').value = getCurrentIstDate();
            setExpenseFormTime(getCurrentIstTime());

            // Load wallet balance
            try {
                const wallet = await getWalletSummary();
                if (wallet) {
                    document.getElementById('currentBalance').textContent = '₹' + wallet.remaining.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                }
            } catch (e) { console.error(e); }

            // Load categories
            try {
                categoriesList = await getCategories();
                const select = document.getElementById('category');
                categoriesList.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.icon + ' ' + cat.name;
                    opt.dataset.name = cat.name;
                    opt.dataset.icon = cat.icon;
                    select.appendChild(opt);
                });
                // Add "Others" option
                const othersOpt = document.createElement('option');
                othersOpt.value = 'others';
                othersOpt.textContent = '📦 Others (Custom)';
                select.appendChild(othersOpt);
            } catch (e) { console.error(e); }
        });

        // Show/hide custom category input
        document.getElementById('category').addEventListener('change', (e) => {
            const customGroup = document.getElementById('customCategoryGroup');
            if (e.target.value === 'others') {
                customGroup.style.display = 'block';
                document.getElementById('customCategory').required = true;
            } else {
                customGroup.style.display = 'none';
                document.getElementById('customCategory').required = false;
            }
        });

        // Form submission
        const expenseForm = document.getElementById('expenseForm');
        const addExpenseBtn = document.getElementById('addExpenseBtn');

        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlerts();

            const amount = document.getElementById('amount').value;
            const categorySelect = document.getElementById('category');
            const categoryValue = categorySelect.value;
            const description = document.getElementById('description').value.trim();
            const expenseDate = document.getElementById('expenseDate').value;
            let expenseTime = '';

            try {
                expenseTime = to24HourTime(
                    expenseHourSelect.value,
                    expenseMinuteSelect.value,
                    expenseMeridiemSelect.value
                );
                validateExpenseDateTime(expenseDate, expenseTime);
            } catch (err) {
                if (isFutureTimeValidationError(err)) {
                    alert(err.message);
                }
                showError(err.message);
                return;
            }

            if (!amount || !categoryValue || !expenseDate) {
                showError('Please fill in all required fields.');
                return;
            }

            let categoryId = categoryValue;
            let categoryName = '';

            if (categoryValue === 'others') {
                const customName = document.getElementById('customCategory').value.trim();
                if (!customName) {
                    showError('Please enter a custom category name.');
                    return;
                }

                addExpenseBtn.disabled = true;
                addExpenseBtn.innerHTML = '<div class="spinner"></div> Adding...';

                try {
                    // Create custom category
                    const newCat = await addCategory(customName);
                    categoryId = newCat.id;
                    categoryName = customName;
                } catch (err) {
                    showError('Failed to create custom category: ' + err.message);
                    addExpenseBtn.disabled = false;
                    addExpenseBtn.textContent = 'Add Expense';
                    return;
                }
            } else {
                const selectedOpt = categorySelect.options[categorySelect.selectedIndex];
                categoryName = selectedOpt.dataset.name;
            }

            addExpenseBtn.disabled = true;
            addExpenseBtn.innerHTML = '<div class="spinner"></div> Adding...';

            try {
                await addExpense(amount, categoryId, categoryName, description, expenseDate, expenseTime);
                showSuccess('Expense added successfully! Your wallet has been updated.');
                expenseForm.reset();
                document.getElementById('expenseDate').value = getCurrentIstDate();
                setExpenseFormTime(getCurrentIstTime());
                document.getElementById('customCategoryGroup').style.display = 'none';

                // Update balance
                const wallet = await getWalletSummary();
                if (wallet) {
                    document.getElementById('currentBalance').textContent = '₹' + wallet.remaining.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                }
            } catch (err) {
                if (isFutureTimeValidationError(err)) {
                    alert(err.message);
                }
                showError(err.message || 'Failed to add expense. Please try again.');
            }

            addExpenseBtn.disabled = false;
            addExpenseBtn.textContent = 'Add Expense';
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        function showError(msg) {
            document.getElementById('expenseErrorText').textContent = msg;
            document.getElementById('expenseError').classList.add('show');
        }

        function showSuccess(msg) {
            document.getElementById('expenseSuccessText').textContent = msg;
            document.getElementById('expenseSuccess').classList.add('show');
        }

        function hideAlerts() {
            document.getElementById('expenseError').classList.remove('show');
            document.getElementById('expenseSuccess').classList.remove('show');
        }
    </script>
</body>

</html>
