<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense – ExpenseIQ</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- ======= APP NAVIGATION ======= -->
    <nav class="app-nav">
        <div class="container">
            <a href="dashboard.html" class="navbar-logo">
                <span class="brand-text">ExpenseIQ</span>
            </a>
            <div class="app-nav-links">
                <a href="dashboard.html">📊 <span class="nav-text">Dashboard</span></a>
                <a href="add-expense.html" class="active">➕ <span class="nav-text">Add Expense</span></a>
                <a href="transactions.html">📜 <span class="nav-text">Transactions</span></a>
                <a href="savings.html">💰 <span class="nav-text">Savings</span></a>
                <a href="profile.html">👤 <span class="nav-text">Profile</span></a>
                <a href="#" class="logout-link" id="logoutBtn">🚪 <span class="nav-text">Logout</span></a>
            </div>
        </div>
    </nav>

    <!-- ======= PAGE CONTENT ======= -->
    <main class="page-content">
        <div class="container" style="max-width:640px;">
            <div class="page-header">
                <h1>Add Expense</h1>
                <p>Log your spending to keep your wallet updated.</p>
            </div>

            <!-- Wallet Balance Card -->
            <div class="stat-card"
                style="margin-bottom:28px;border-color:var(--primary-lighter);background:var(--primary-lighter);">
                <div class="stat-icon blue">💵</div>
                <div class="stat-info">
                    <h4 style="color:var(--primary);">Available Balance</h4>
                    <div class="stat-value" id="currentBalance" style="color:var(--primary);">₹0</div>
                </div>
            </div>

            <div class="alert alert-error" id="expenseError">
                <span>⚠️</span>
                <span id="expenseErrorText"></span>
            </div>

            <div class="alert alert-success" id="expenseSuccess">
                <span>✅</span>
                <span id="expenseSuccessText"></span>
            </div>

            <!-- Add Expense Form -->
            <div class="card card-elevated">
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" class="form-control" placeholder="Enter amount" required
                            min="1" step="0.01">
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" class="form-control" required>
                            <option value="">Select a category</option>
                        </select>
                    </div>

                    <!-- Custom category input (shown when "Others" is selected) -->
                    <div class="form-group" id="customCategoryGroup" style="display:none;">
                        <label for="customCategory">Custom Category Name</label>
                        <input type="text" id="customCategory" class="form-control"
                            placeholder="e.g., Gym, Gifts, Medicine">
                        <span class="form-hint">This category will be saved for future use.</span>
                    </div>

                    <div class="form-group">
                        <label for="description">Description (Optional)</label>
                        <input type="text" id="description" class="form-control" placeholder="e.g., Lunch at canteen">
                    </div>

                    <div class="form-group">
                        <label for="expenseDate">Date</label>
                        <input type="date" id="expenseDate" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="addExpenseBtn">
                        Add Expense
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        let categoriesList = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const authed = await requireAuth();
            if (!authed) return;

            // Set default date to today
            document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];

            // Load wallet balance
            try {
                const wallet = await getWalletSummary();
                if (wallet) {
                    document.getElementById('currentBalance').textContent = '₹' + wallet.remaining.toLocaleString('en-IN');
                }
            } catch (e) { console.error(e); }

            // Load categories
            try {
                categoriesList = await getCategories();
                const select = document.getElementById('category');
                categoriesList.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.id;
                    opt.textContent = cat.icon + ' ' + cat.name;
                    opt.dataset.name = cat.name;
                    opt.dataset.icon = cat.icon;
                    select.appendChild(opt);
                });
                // Add "Others" option
                const othersOpt = document.createElement('option');
                othersOpt.value = 'others';
                othersOpt.textContent = '📦 Others (Custom)';
                select.appendChild(othersOpt);
            } catch (e) { console.error(e); }
        });

        // Show/hide custom category input
        document.getElementById('category').addEventListener('change', (e) => {
            const customGroup = document.getElementById('customCategoryGroup');
            if (e.target.value === 'others') {
                customGroup.style.display = 'block';
                document.getElementById('customCategory').required = true;
            } else {
                customGroup.style.display = 'none';
                document.getElementById('customCategory').required = false;
            }
        });

        // Form submission
        const expenseForm = document.getElementById('expenseForm');
        const addExpenseBtn = document.getElementById('addExpenseBtn');

        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlerts();

            const amount = document.getElementById('amount').value;
            const categorySelect = document.getElementById('category');
            const categoryValue = categorySelect.value;
            const description = document.getElementById('description').value.trim();
            const expenseDate = document.getElementById('expenseDate').value;

            if (!amount || !categoryValue || !expenseDate) {
                showError('Please fill in all required fields.');
                return;
            }

            let categoryId = categoryValue;
            let categoryName = '';

            if (categoryValue === 'others') {
                const customName = document.getElementById('customCategory').value.trim();
                if (!customName) {
                    showError('Please enter a custom category name.');
                    return;
                }

                addExpenseBtn.disabled = true;
                addExpenseBtn.innerHTML = '<div class="spinner"></div> Adding...';

                try {
                    // Create custom category
                    const newCat = await addCategory(customName);
                    categoryId = newCat.id;
                    categoryName = customName;
                } catch (err) {
                    showError('Failed to create custom category: ' + err.message);
                    addExpenseBtn.disabled = false;
                    addExpenseBtn.textContent = 'Add Expense';
                    return;
                }
            } else {
                const selectedOpt = categorySelect.options[categorySelect.selectedIndex];
                categoryName = selectedOpt.dataset.name;
            }

            addExpenseBtn.disabled = true;
            addExpenseBtn.innerHTML = '<div class="spinner"></div> Adding...';

            try {
                await addExpense(amount, categoryId, categoryName, description, expenseDate);
                showSuccess('Expense added successfully! Your wallet has been updated.');
                expenseForm.reset();
                document.getElementById('expenseDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('customCategoryGroup').style.display = 'none';

                // Update balance
                const wallet = await getWalletSummary();
                if (wallet) {
                    document.getElementById('currentBalance').textContent = '₹' + wallet.remaining.toLocaleString('en-IN');
                }
            } catch (err) {
                showError(err.message || 'Failed to add expense. Please try again.');
            }

            addExpenseBtn.disabled = false;
            addExpenseBtn.textContent = 'Add Expense';
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logout();
        });

        function showError(msg) {
            document.getElementById('expenseErrorText').textContent = msg;
            document.getElementById('expenseError').classList.add('show');
        }

        function showSuccess(msg) {
            document.getElementById('expenseSuccessText').textContent = msg;
            document.getElementById('expenseSuccess').classList.add('show');
        }

        function hideAlerts() {
            document.getElementById('expenseError').classList.remove('show');
            document.getElementById('expenseSuccess').classList.remove('show');
        }
    </script>
</body>

</html>
