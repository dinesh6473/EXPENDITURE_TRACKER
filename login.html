<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your ExpenseIQ account and manage your monthly expenses.">
    <title>Login – ExpenseIQ</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="auth-page">
    <!-- ======= HEADER ======= -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-logo">
                <span style="font-size:1.1rem;">←</span>
                <span class="brand-text">ExpenseIQ</span>
            </a>
            <div class="navbar-links">
                <a href="signup.html" class="btn btn-primary btn-sm" style="color:#fff;">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- ======= LOGIN FORM ======= -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Login to manage your monthly expenses</p>

            <div class="alert alert-error" id="loginError">
                <span>⚠️</span>
                <span id="loginErrorText"></span>
            </div>

            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            await redirectIfLoggedIn();
        });

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const loginErrorText = document.getElementById('loginErrorText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.classList.remove('show');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div> Logging in...';

            try {
                await login(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showError(err.message || 'Invalid email or password. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        function showError(message) {
            loginErrorText.textContent = message;
            loginError.classList.add('show');
        }
    </script>
</body>

</html>
